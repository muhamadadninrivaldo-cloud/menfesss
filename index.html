<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>NGL Clone Premium</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>
<body>

<div class="bg"></div>

<div class="container">

    <div class="card">

        <h1>NGL Clone</h1>

        <p>
            Login atau register dulu 
        </p>

        <div class="input-box">

            <i class="fa fa-user"></i>

            <input
                type="text"
                id="username"
                placeholder="Masukkan username"
            >

        </div>

        <div class="input-box">

            <i class="fa fa-lock"></i>

            <input
                type="password"
                id="password"
                placeholder="Masukkan password"
            >

        </div>

        <button
            class="register-btn"
            onclick="register()"
        >

            <i class="fa fa-user-plus"></i>

            Register

        </button>

        <button
            class="login-btn"
            onclick="login()"
        >

            <i class="fa fa-right-to-bracket"></i>

            Login

        </button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
